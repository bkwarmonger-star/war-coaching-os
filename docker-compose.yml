version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0-alpine
    container_name: war-coaching-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: war_coaching
      MYSQL_USER: coaching
      MYSQL_PASSWORD: coaching123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - war-coaching

  # W.A.R. Coaching OS Application
  app:
    build: .
    container_name: war-coaching-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://coaching:coaching123@mysql:3306/war_coaching
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./dist:/app/dist:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - war-coaching
    restart: unless-stopped

  # Optional: Redis (for caching/sessions if needed later)
  # redis:
  #   image: redis:7-alpine
  #   container_name: war-coaching-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - war-coaching

volumes:
  mysql_data:
  # redis_data:

networks:
  war-coaching:
    driver: bridge

# Usage:
# 
# 1. Copy .env.production.example to .env and fill in your values
# 2. Build the app: pnpm build
# 3. Start services: docker-compose up -d
# 4. Verify health: curl http://localhost:3000/health
# 5. View logs: docker-compose logs -f app
# 6. Stop services: docker-compose down
#
# Notes:
# - Database data persists in mysql_data volume
# - Change MYSQL_PASSWORD and JWT_SECRET in production
# - Configure real OAuth/LLM credentials before deploying
# - Use docker-compose for local dev/staging only
