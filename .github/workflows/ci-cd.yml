name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Quality checks: TypeScript, linting, formatting
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.4.1

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm run check

      - name: Run tests
        run: pnpm test

  # Build: Verify production build succeeds
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.4.1

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Docker build: Create and optionally push Docker image
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deployment: Optional auto-deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Deploy to staging
        run: |
          echo "🚀 Staging deployment would run here"
          echo "Note: Configure your staging deployment trigger"
          echo "This could be:"
          echo "  - SSH deploy to staging server"
          echo "  - Kubernetes deployment"
          echo "  - Cloud platform deploy (AWS, GCP, etc.)"
        # Add your staging deployment commands here
        # Example:
        # - name: SSH Deploy
        #   uses: appleboy/ssh-action@master
        #   with:
        #     host: ${{ secrets.STAGING_HOST }}
        #     username: ${{ secrets.STAGING_USER }}
        #     key: ${{ secrets.STAGING_SSH_KEY }}
        #     script: |
        #       cd /app
        #       docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
        #       docker-compose up -d

  # Deployment: Manual approval for production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://warcoachos-btyuu3qb.manus.space
    steps:
      - name: Production deployment
        run: |
          echo "✅ Production deployment ready"
          echo "Image is built and pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
          echo "Manual deployment steps:"
          echo "  1. Review the Docker image in the container registry"
          echo "  2. Run smoke tests on staging first"
          echo "  3. Deploy to production manually or via your CD platform"
        # Add your production deployment commands here
        # This typically requires manual approval in GitHub
        # - name: Deploy to production
        #   uses: appleboy/ssh-action@master
        #   with:
        #     host: ${{ secrets.PROD_HOST }}
        #     username: ${{ secrets.PROD_USER }}
        #     key: ${{ secrets.PROD_SSH_KEY }}
        #     script: |
        #       cd /app
        #       docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
        #       docker-compose up -d

  # Notifications
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [ quality, build ]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.quality.result }}" == "failure" ] || [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All checks passed"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ CI/CD pipeline passed!\n\n- TypeScript: ✅\n- Tests: ✅\n- Build: ✅\n\nReady for review.'
            })
